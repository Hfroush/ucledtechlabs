services:
  - type: web
    name: ucledtechlabs-api
    runtime: node
    buildCommand: npm install --include=dev && esbuild server/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: BACKEND_ONLY
        value: "true"  # skip static file serving — frontend is on Vercel
      - key: FRONTEND_URL
        sync: false  # set to your Vercel URL, e.g. https://ucledtechlabs.vercel.app
      - key: CLOUDINARY_URL
        sync: false  # set to your Cloudinary URL, e.g. cloudinary://api_key:api_secret@cloud_name
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false  # set a strong password in the Render dashboard
